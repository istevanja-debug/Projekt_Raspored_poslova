<!DOCTYPE html>
<html>
<head>
    <title>Dodaj posao</title>

    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body>

<div class="container mt-4">

<h1>Dodaj posao</h1>

<form method="POST">

    <label>Adresa:</label><br>
    <input type="text"
           name="adresa"
           class="form-control">
    <br><br>

    <label>Datum:</label><br>
    <input type="date"
           name="datum"
           class="form-control"><br><br>

    <label>Vrijeme:</label><br>
    <input type="time"
           name="vrijeme"
           class="form-control"><br><br>

    <label>Klima:</label><br>
    <input type="text"
           name="klima"
           class="form-control"><br><br>

    <label>Radnik:</label><br>
    <input type="text"
           name="radnik"
           class="form-control"><br><br>

    <label>Cijena:</label><br>
    <input type="number"
           step="0.01"
           name="cijena"
           class="form-control"><br><br>

    <button type="submit"
            class="btn btn-primary">Dodaj posao</button>

</form>

</div>
</body>
</html>
